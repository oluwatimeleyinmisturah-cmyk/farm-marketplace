{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f0faf4;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:15px;
}

.card {
    width:100%;
    max-width:420px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="card shadow p-4">

<h5 class="text-center mb-3">Set New Password</h5>

{% if messages %}
{% for msg in messages %}
<div class="alert alert-info">{{ msg }}</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="password" name="password1" class="form-control mb-3" placeholder="New Password" required>

<input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>

<button class="btn btn-success w-100">Update Password</button>

</form>

</div>

</body>
</html>
